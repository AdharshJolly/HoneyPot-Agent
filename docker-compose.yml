version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      SESSION_STORE: redis_postgres
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/honeypot
      INTEL_EXPORT_ENABLED: "true"
      INTEL_EXPORT_PATH: exports/intel_snapshots.jsonl
    env_file:
      - .env
    volumes:
      - ./exports:/app/exports
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: honeypot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d honeypot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
